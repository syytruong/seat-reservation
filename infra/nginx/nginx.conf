events {}

http {
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;
  limit_req_status 429;

  upstream web_upstream { server web:5173; }
  upstream auth_upstream { server auth-service:3001; }
  upstream seat_upstream { server seat-service:3002; }
  upstream payment_upstream { server payment-service:3003; }

  server {
    listen 8080;

    proxy_set_header X-Request-Id $request_id;
    proxy_set_header Host $host;

    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://auth_upstream;
    }

    location /api/auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth_upstream;
    }

    location /api/seats {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://seat_upstream;
      proxy_buffering off;
    }

    location /api/payments/webhooks/ {
      limit_req zone=webhook burst=10 nodelay;
      proxy_pass http://payment_upstream;
    }

    location /api/payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payment_upstream;
    }

    location / {
      proxy_pass http://web_upstream;
    }
  }
}
