services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seat}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    command: ["postgres", "-c", "log_min_duration_statement=250", "-c", "log_lock_waits=on", "-c", "deadlock_timeout=1s"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    env_file: .env
    environment:
      AUTH_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health/ready >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  seat-service:
    build:
      context: .
      dockerfile: apps/seat-service/Dockerfile
    env_file: .env
    environment:
      SEAT_PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health/ready >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    env_file: .env
    environment:
      PAYMENT_PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health/ready >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      WEB_PORT: 5173
    depends_on:
      auth-service:
        condition: service_healthy
      seat-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_started
      auth-service:
        condition: service_healthy
      seat-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy

volumes:
  pgdata:
